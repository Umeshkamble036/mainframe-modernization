# =============================================================
# Development Profile - H2 In-Memory Database
# Use this profile for local development and testing
# Activate with: spring.profiles.active=dev
# =============================================================

spring.datasource.url=jdbc:h2:mem:custacct;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Web Console for database inspection
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate - Auto-create schema for development
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# Spring Batch
# ---------------------------------------------------------------
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# ---------------------------------------------------------------
# File Upload
# ---------------------------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ---------------------------------------------------------------
# Batch Scheduler
# ---------------------------------------------------------------
custacct.batch.cron=0 0 1 * * ?

# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------
# Logging (verbose for dev)
# ---------------------------------------------------------------
logging.level.com.custacct=DEBUG
logging.level.org.springframework.batch=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
