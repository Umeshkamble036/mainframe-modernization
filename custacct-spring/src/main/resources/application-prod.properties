# =============================================================
# Production Profile - PostgreSQL Database
# Use this profile for production deployment
# Activate with: spring.profiles.active=prod
# =============================================================

# ---------------------------------------------------------------
# PostgreSQL Connection
# ---------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/custacct
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# ---------------------------------------------------------------
# Hibernate Configuration
# ---------------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ---------------------------------------------------------------
# Spring Batch
# ---------------------------------------------------------------
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# ---------------------------------------------------------------
# File Upload
# ---------------------------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ---------------------------------------------------------------
# Batch Scheduler
# ---------------------------------------------------------------
custacct.batch.cron=0 0 1 * * ?

# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------
# Logging (minimal for production)
# ---------------------------------------------------------------
logging.level.com.custacct=INFO
logging.level.org.springframework.batch=WARN
logging.level.org.hibernate.SQL=WARN
