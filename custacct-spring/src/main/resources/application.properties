# =============================================================
# Customer Account Management System - Spring Boot Configuration
# =============================================================

spring.application.name=custacct-spring

# ---------------------------------------------------------------
# H2 In-Memory Database (dev/test)
# Swap for PostgreSQL in production — see comments below
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:custacct;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (http://localhost:8080/h2-console) — disable in production
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# Production PostgreSQL example (uncomment and remove H2 deps)
# ---------------------------------------------------------------
# spring.datasource.url=jdbc:postgresql://localhost:5432/custacct
# spring.datasource.username=${DB_USER}
# spring.datasource.password=${DB_PASSWORD}
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=validate

# ---------------------------------------------------------------
# Spring Batch
# ---------------------------------------------------------------
# Don't auto-run jobs on startup — we trigger via REST or scheduler
spring.batch.job.enabled=false

# Use the main datasource for Spring Batch metadata tables
spring.batch.jdbc.initialize-schema=always

# ---------------------------------------------------------------
# File Multipart (for POST /api/batch/load-file)
# ---------------------------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ---------------------------------------------------------------
# Batch Scheduler (replaces AWS EventBridge in batch-scheduler.yaml)
# Daily at 01:00 — cron: second minute hour day month weekday
# ---------------------------------------------------------------
custacct.batch.cron=0 0 1 * * ?

# ---------------------------------------------------------------
# Server
# ---------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------
# Logging
# ---------------------------------------------------------------
logging.level.com.custacct=INFO
logging.level.org.springframework.batch=INFO
logging.level.org.hibernate.SQL=WARN
